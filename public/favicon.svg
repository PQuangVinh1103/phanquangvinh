<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#ffffff"/>
  <!-- p: circle + descender, navy -->
  <circle cx="22" cy="24" r="13" fill="none" stroke="#1B2B6B" stroke-width="6.5"/>
  <line x1="9" y1="24" x2="9" y2="55" stroke="#1B2B6B" stroke-width="6.5" stroke-linecap="round"/>
  <!-- q: circle offset, gray -->
  <circle cx="34" cy="24" r="13" fill="none" stroke="#5C6880" stroke-width="6.5"/>
  <!-- v: blue slash -->
  <polyline points="46,10 54,50 60,10" fill="none" stroke="#2563EB" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
